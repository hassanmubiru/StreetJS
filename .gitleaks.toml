# Gitleaks configuration for StreetJS.
# Extends the upstream default ruleset and adds project-scoped allowlists for
# well-known public test fixtures (documented emulator keys, obviously-fake
# signing secrets in tests/examples) to keep the scan free of false positives.
#
# Run locally:  gitleaks detect --source . --config .gitleaks.toml --redact
# CI enforces this on every push/PR (see .github/workflows/secret-scan.yml).

title = "StreetJS Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Known public/test fixtures that are not real secrets."

# Paths that only ever contain fixtures, fakes, sample env templates, docs, or
# gitignored build artifacts / local env (never committed source secrets).
paths = [
  '''\.env$''',
  '''\.env\.example$''',
  '''(^|/)dist/''',
  '''(^|/)docs/''',
  '''.*/tests/.*\.test\.(ts|js)$''',
  '''.*/examples/.*''',
  '''packages/.*/example/.*''',
  # Retired local/dev signing keypair accidentally committed once (commit
  # d7bbfc40, 2026-06-14), then removed and gitignored. This is NOT the
  # production signing key — the publish pipeline signs from the
  # STREET_PLUGIN_SIGNING_KEY GitHub secret, and this file is referenced by no
  # workflow or signing script. The blob is also purged from history; this path
  # allowlist is defense-in-depth so the historical commit can't fail the scan.
  '''(^|/)street-signing\.(key|pub)\.pem$''',
]

# Specific well-known/public or obviously-fake values used in tests, docs, and
# sample compose files.
regexes = [
  # Azurite's documented well-known development account key (public constant).
  '''Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==''',
  # Obviously-fake signing secrets used in unit tests / examples.
  '''a-very-secret-signing-key''',
  '''a-very-secret-key-1234''',
  '''street_test_key''',
  '''street_secret''',
  # Placeholder dev-config values in sample docker-compose files.
  '''change-me-in-production''',
  '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef''',
  # Placeholder/sample tokens in docs.
  '''sk-\.\.\.''',
  '''sk-ant-\.\.\.''',
  '''sk_test_\.\.\.''',
]
