name: Docs SEO

# Builds the Jekyll documentation site and asserts the SEO artifacts render
# (sitemap.xml, robots.txt → sitemap, Open Graph + description + JSON-LD on the
# home page, and the docs search index), plus that internal/working docs stay
# excluded from the sitemap and noindexed while remaining reachable by URL.
# Complements the deploy in pages.yml.

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/docs/assert-seo.mjs'
      - 'scripts/docs/assert-sitemap-cleanliness.mjs'
      - '.github/workflows/docs-seo.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: docs-seo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-seo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Build site
        run: bundle exec jekyll build
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Assert SEO artifacts
        working-directory: .
        env:
          SITE_DIR: docs/_site
        run: node scripts/docs/assert-seo.mjs
      - name: Assert sitemap cleanliness
        working-directory: .
        env:
          SITE_DIR: docs/_site
        run: node scripts/docs/assert-sitemap-cleanliness.mjs
