name: street CI/CD

# ── Consolidated CI/CD ────────────────────────────────────────────────────
# This single workflow consolidates all CI/CD into one file — replacing 5
# previously standalone workflows (yaml-lint, security-lint, memory-leak,
# system-tests, publish) that were merged into the original ci-cd base.
# Every job runs in parallel on separate runners for maximum feedback speed.
#
# Architecture overview:
#   ┌─ build-and-test ─┬── test-cli-unit ──┬── migration-integration ──┐
#   │  (Core, matrix)  │  (CLI, matrix)    │  (CLI+PG, matrix)        │
#   ├─ memory-leak ────┼── system-tests ───┼── security-lint ─────────┤
#   │  (matrix)        │  (matrix, 6 suit) │  (zizmor, single run)    │
#   └──┬── summary (after system-tests) ─────────────────────────────────┘
#      │
#      ├── docker-build  (main branch only, needs build-and-test)
#      └── test-and-publish  (semver tags only, needs build-and-test)
#
# Postgres service containers are spun up only for jobs that need them.
# Use workflow_dispatch with a suite input to run a specific system test.
# Tag pushes (v*.*.*) trigger npm publish after core tests pass.

# ── Triggers ───────────────────────────────────────────────────────────────
# Three trigger types control when this workflow runs:
#   push:           Code push to main/develop branches, or any semver tag
#   pull_request:   PR opened/synced targeting main
#   workflow_dispatch: Manual trigger with a suite selector for system tests
"on":
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Run a specific system test suite (leave blank for all)'
        required: false
        type: choice
        options:
          - all
          - security
          - memory-safety
          - load-testing
          - fuzz-testing
          - chaos-testing
          - infrastructure
        default: all

# ── Concurrency ──────────────────────────────────────────────────────────
# Groups all CI runs by git ref. A new push to the same branch/PR cancels
# any in-progress runs — saves runner minutes on iterative pushes.
# The publish job uses its own concurrency group to avoid cancellation.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Permissions ──────────────────────────────────────────────────────────
# Minimal default: read-only contents. Jobs that need write or id-token
# permissions (docker-build, test-and-publish) declare them at job level.
permissions:
  contents: read

# ── Shared environment ───────────────────────────────────────────────────
# These values are inherited by all jobs. Jobs can override or extend
# them at the job or step level as needed.
#   PG_*      — PostgreSQL connection parameters for service containers
#   SUITE     — workflow_dispatch input: selects which system test suite to run
env:
  PG_HOST: localhost
  PG_PORT: 5432
  PG_USER: street
  PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  PG_DATABASE: street_test
  SUITE: ${{ inputs.suite || 'all' }}

jobs:
  # ── build-and-test: Core integration tests (gatekeeper) ────────────────
  # Purpose:   Compile and test the @streetjs/core package against a live
  #            PostgreSQL instance. Runs integration tests with coverage.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled — both must report)
  # Services:  postgres:16-alpine with health check
  # Outputs:   Coverage report artifact uploaded per matrix entry
  # Critical path: Other jobs (docker-build, test-and-publish) depend on this.
  build-and-test:
    name: Core (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate YAML syntax
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, sys, yaml
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
              for f in files:
                  if not (f.endswith('.yml') or f.endswith('.yaml')):
                      continue
                  path = os.path.join(root, f)
                  try:
                      data = yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      msg = str(e).replace('\n', ' | ')
                      print(f'::error title=YAML Syntax Error,file={path}::{msg}')
                      errors += 1
                      continue
                  if '.github/workflows/' in path:
                      if not isinstance(data, dict):
                          print(f'::error title=Invalid Workflow,file={path}::Root must be a mapping')
                          errors += 1
                      elif 'name' not in data:
                          print(f'::warning title=Missing name,file={path}::Workflow missing name key')
                  print(f'  OK: {path}')
          if errors:
              sys.exit(1)
          PYEOF

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & build (with tests)
        run: npm run build:app -w packages/core

      - name: Run integration tests with coverage
        env:
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: npm run coverage -w packages/core

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: core-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/core/coverage/

  # ── test-cli-unit: CLI unit tests ───────────────────────────────────────
  # Purpose:   Run @streetjs/cli package unit tests. Fast check for CLI-only
  #            logic changes (argument parsing, help output, command dispatch).
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Requires:  Core package must be built first (build step depends on dist/)
  #            but there is no formal needs: dependency — both run in parallel.
  # Outputs:   Coverage report artifact uploaded per matrix entry
  test-cli-unit:
    name: CLI Unit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run CLI tests
        run: npm run test -w packages/cli

      - name: Run CLI coverage
        run: npm run coverage -w packages/cli

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

  # ── migration-integration: CLI migration tests ─────────────────────────
  # Purpose:   Test the CLI's migration commands (migrate, rollback) against
  #            a live PostgreSQL instance. Catches SQL migration issues.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Services:  postgres:16-alpine with health check (same as build-and-test)
  # Outputs:   Coverage report artifact uploaded per matrix entry
  migration-integration:
    name: CLI Migration (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run migration integration with coverage
        run: npm run coverage:pg -w packages/cli

      - name: Upload migration coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-migration-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

  # ── memory-leak: Memory safety & wire protocol ─────────────────────────
  # Purpose:   Run memory leak detection tests and wire protocol compliance
  #            tests. No PostgreSQL needed — the wire driver is tested using
  #            a mock TCP server. Isolates memory-sensitive tests.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Timeout:   15 minutes (leak tests can be slow under GC pressure)
  memory-leak:
    name: Memory Leak (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run memory leak and wire protocol tests
        run: node --test packages/core/dist/tests/memory-leak.test.js packages/core/dist/tests/wire-protocol.test.js

  # ── system-tests: Six system-level test suites ─────────────────────────
  # Purpose:   Run comprehensive system-level tests: security (XSS, JWT,
  #            session), memory-safety (bounded buffers), load-testing,
  #            fuzz-testing, chaos-testing, and infrastructure.
  #            Supports workflow_dispatch suite selection via env.SUITE.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Timeout:   15 minutes
  # Dispatch:  Each suite can be selected individually via workflow_dispatch
  #            input. When 'all', runs the unified system test runner too.
  # Note:      Infrastructure tests set PG_HOST="" to skip PG-dependent cases.
  system-tests:
    name: System Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run security tests
        if: env.SUITE == 'all' || env.SUITE == 'security'
        run: node --test packages/core/dist/tests/system/security.test.js

      - name: Run memory-safety tests
        if: env.SUITE == 'all' || env.SUITE == 'memory-safety'
        run: node --test packages/core/dist/tests/system/memory-safety.test.js

      - name: Run load-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'load-testing'
        run: node --test packages/core/dist/tests/system/load-testing.test.js

      - name: Run fuzz-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'fuzz-testing'
        run: node --test packages/core/dist/tests/system/fuzz-testing.test.js

      - name: Run chaos-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'chaos-testing'
        run: node --test packages/core/dist/tests/system/chaos-testing.test.js

      - name: Run infrastructure tests (no PG)
        if: env.SUITE == 'all' || env.SUITE == 'infrastructure'
        run: node --test packages/core/dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ""

      - name: Run unified system test runner
        if: env.SUITE == 'all'
        run: node packages/core/dist/tests/system/runner.js --ci --json --skip-pg

      - name: Upload system test results
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: system-test-results-${{ matrix.node }}-${{ github.sha }}
          path: packages/core/tests/system/system-test-results.json

  # ── security-lint: Static analysis for workflow security ───────────────
  # Purpose:   Run zizmor — a static analyzer for GitHub Actions workflows.
  #            Scans all .yml/.yaml files for credential leaks, injection,
  #            and other CI security antipatterns.
  # Depends:   Nothing (independent, fastest job at ~2 min)
  # Timeout:   5 minutes (generous for static analysis)
  # Config:    medium+ severity, annotations on PRs, no advanced security
  security-lint:
    name: Security Lint (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: medium
          advanced-security: false
          annotations: true

  # ── summary: Post-system-test summary step ─────────────────────────────
  # Purpose:   Print a summary of system test results to the GitHub Actions
  #            job summary. Only collects after system-tests completes.
  # Depends:   system-tests (with always() — runs even if tests failed)
  # Note:      Uses GITHUB_STEP_SUMMARY for rich rendering in the UI.
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: system-tests
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## System Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 6 system test suites executed (security, memory-safety, load-testing, fuzz-testing, chaos-testing, infrastructure)." >> $GITHUB_STEP_SUMMARY

  # ── docker-build: Container image build & push ─────────────────────────
  # Purpose:   Build a distroless Docker image and push to GitHub Container
  #            Registry. Only runs on main branch after core tests pass.
  # Depends:   build-and-test (waits for integration tests to pass)
  # Trigger:   Push to main branch only
  # Permissions: packages: write (required for GHCR push)
  # Tags:      :latest and :<commit-sha>
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── test-and-publish: npm provenance publish ───────────────────────────
  # Purpose:   Verify the package, build, run additional pre-publish checks
  #            (lint, security, memory-safety, infrastructure), then publish
  #            to npm with provenance attestation.
  # Depends:   build-and-test (waits for core integration tests to pass)
  # Trigger:   Semver tag push only (v*.*.*)
  # Timeout:   20 minutes (includes multiple test suites)
  # Permissions: id-token: write (npm provenance requires OIDC token)
  # Concurrency: Separate group (publish-${{ github.ref }}) to avoid cancellation
  #              of a publish run by subsequent CI pushes on the same tag.
  # Steps:
  #   1. Version match — ensures git tag matches packages/core/package.json
  #   2. Build & lint  — full TypeScript compilation and noEmit check
  #   3. Pre-publish tests — run security, memory-safety, infrastructure tests
  #      with PG_HOST="" to skip PG-dependent cases (already covered by build-and-test)
  #   4. Library build — clean build matching prepublishOnly script
  #   5. npm publish  — with --provenance for supply-chain security
  test-and-publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match packages/core/package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: TypeScript compilation (full project with tests)
        run: npm run build:app -w packages/core

      - name: Run lint
        run: npm run lint -w packages/core

      - name: Run security tests
        run: node --test --test-concurrency=1 packages/core/dist/tests/system/security.test.js
        env:
          PG_HOST: ""

      - name: Run memory-safety tests
        run: node --test --test-concurrency=1 packages/core/dist/tests/system/memory-safety.test.js
        env:
          PG_HOST: ""

      - name: Run infrastructure tests
        run: node --test --test-concurrency=1 packages/core/dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ""

      - name: Verify library build (matches prepublishOnly)
        run: npm run build -w packages/core

      - name: Publish to npm
        run: npm publish -w packages/core --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
