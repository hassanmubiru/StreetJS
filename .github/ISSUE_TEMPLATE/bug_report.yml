name: Bug report
description: Report a reproducible defect in StreetJS
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not include secrets or security
        vulnerabilities here** — report those privately via SECURITY.md.
  - type: input
    id: package
    attributes:
      label: Affected package
      description: e.g. streetjs, @streetjs/commerce, @streetjs/search
      placeholder: "@streetjs/..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.x"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal, runnable reproduction is ideal.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, database, deployment target.
    validations:
      required: false
