<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — StreetJS HTMX Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:2rem}
    h1{font-size:1.4rem;margin:0 0 .25rem}
    .sub{color:#94a3b8;font-size:.9rem;margin:0 0 1.5rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
    .tile{background:#111a2e;border:1px solid #1f2a44;border-radius:12px;padding:1.1rem}
    .tile .label{color:#94a3b8;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
    .tile .value{font-size:1.8rem;font-weight:700;margin-top:.35rem}
    .foot{color:#64748b;font-size:.78rem;margin-top:1.5rem}
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="sub">Server-rendered with <code>@streetjs/plugin-htmx</code> — no SPA build step. Tiles refresh over HTMX + SSE.</p>
  {{{ body }}}
  <p class="foot">StreetJS reference app · uptime {{ uptime }}s</p>
</body>
</html>
